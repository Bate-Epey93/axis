<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Axis — Peak Condition</title>
  <meta name="description" content="Personal peak-condition protocol: equipment-aware training, breathwork, and daily tracks.">
  <meta name="theme-color" content="#0A0A0B">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Axis">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <main id="screen"></main>

    <nav id="tabbar" class="hidden">
      <button class="tab active" data-tab="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        Today
      </button>
      <button class="tab" data-tab="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20h18"/><path d="M5 16l4-6 4 3 6-8"/></svg>
        Progress
      </button>
      <button class="tab" data-tab="plan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M8 2v4M16 2v4M3 9h18"/></svg>
        Plan
      </button>
      <button class="tab" data-tab="equip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7v10M18 7v10M6 12h12"/><rect x="2" y="9" width="4" height="6" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/></svg>
        Gear
      </button>
      <button class="tab" data-tab="more">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 1 0 9 9"/><path d="M12 8v4l3 2"/></svg>
        Recovery
      </button>
    </nav>

    <div id="restbar" class="hidden">
      <div class="rt-time num">1:30</div>
      <div class="rt-bar"><div class="rt-fill" style="width:100%"></div></div>
      <button data-act="add-rest" class="num">+30s</button>
      <button data-act="skip-rest">Skip</button>
    </div>

    <div id="toast" role="status"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
